spring.application.name=com
spring.graphql.path=/graphql
spring.datasource.url=${DATASOURCE_URL:jdbc:postgresql://localhost:5432/kanban}
spring.datasource.username=${DATASOURCE_USERNAME:postgres}
spring.datasource.password=${DATASOURCE_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.serialization.fail-on-self-references=false

server.port=8080

spring.jpa.hibernate.ddl-auto=validate
server.address=0.0.0.0

server.compression.enabled=true
server.compression.mime-types=application/json,application/graphql-response+json,text/javascript,text/css,text/html,text/plain
server.compression.min-response-size=1024

# ==================== DATABASE CONNECTION POOLING ====================
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000

# ==================== JPA/HIBERNATE OPTIMIZATION ====================
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.fetch_size=50

# ==================== HIBERNATE 2ND LEVEL CACHE ====================
spring.jpa.properties.hibernate.cache.use_query_cache=true
spring.jpa.properties.hibernate.cache.use_second_level_cache=true

# ==================== SPRING CACHE CONFIGURATION ====================
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=10000,expireAfterWrite=60m,recordStats
spring.cache.cache-names=projects,projectDetails,subgroups,tasksBySubgroup,tasksByAssignee,tasksByIds,users,currentUser,projectMembers,subgroupMembers,tags,attachments

# ==================== EMAIL CONFIGURATION ====================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:465}
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.smtp.starttls.enable=false

# ==================== FRONTEND CONFIGURATION ====================
app.frontend.url=${FRONTEND_URL:http://localhost:3000}
turnstile.secret.key=${TURNSTILE_SECRET_KEY:}
server.forward-headers-strategy=native

# ==================== GOOGLE OAuth2 ====================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri=${OAUTH_REDIRECT_URI:http://localhost:8080}/login/oauth2/code/google

# ==================== YANDEX OAuth2 ====================
spring.security.oauth2.client.registration.yandex.client-id=${YANDEX_CLIENT_ID:}
spring.security.oauth2.client.registration.yandex.client-secret=${YANDEX_CLIENT_SECRET:}
spring.security.oauth2.client.registration.yandex.scope=login:email,login:info
spring.security.oauth2.client.registration.yandex.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.yandex.client-name=Yandex
spring.security.oauth2.client.registration.yandex.redirect-uri=${OAUTH_REDIRECT_URI:http://localhost:8080}/login/oauth2/code/yandex

spring.security.oauth2.client.provider.yandex.authorization-uri=https://oauth.yandex.ru/authorize
spring.security.oauth2.client.provider.yandex.token-uri=https://oauth.yandex.ru/token
spring.security.oauth2.client.provider.yandex.user-info-uri=https://login.yandex.ru/info
spring.security.oauth2.client.provider.yandex.user-name-attribute=id

# ==================== GITHUB OAuth2 ====================
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID:}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET:}
spring.security.oauth2.client.registration.github.scope=user:email
spring.security.oauth2.client.registration.github.redirect-uri=${OAUTH_REDIRECT_URI:http://localhost:8080}/login/oauth2/code/github
spring.security.oauth2.client.registration.github.client-name=GitHub

# ==================== EMAIL VERIFICATION ====================
app.verification.ttl.hours=24
app.verification.auto-delete.enabled=true
app.verification.cleanup.interval=21600000

# ==================== FILE UPLOAD ====================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ==================== JWT ====================
jwt.secret=${JWT_SECRET:your-secret-key-change-in-production}
jwt.expiration=86400000

# ==================== DATABASE MIGRATIONS ====================
spring.flyway.baseline-on-migrate=true
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ==================== GRAPHQL WEBSOCKET ====================
spring.graphql.websocket.path=/graphql/ws
spring.graphql.websocket.connection-init-timeout=60s

# ==================== TELEGRAM BOT CONFIGURATION ====================
telegram.bot.token=${TELEGRAM_BOT_TOKEN:}
telegram.bot.username=${TELEGRAM_BOT_USERNAME:}
telegram.api.url=${TELEGRAM_API_URL:https://api.telegram.org}
# URL для отправки уведомлений Python боту (ВАЖНО: должна быть доступна из Java контейнера)
app.telegram.bot.url=${TELEGRAM_BOT_URL:http://localhost:8001}
